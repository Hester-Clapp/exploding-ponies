<style>
    #turnStatus {
        margin-bottom: 0;
    }

    #playStatus {
        min-height: 1.5em;
    }

    #otherPlayers {
        display: flex;
        gap: 3rem;
        flex-wrap: nowrap;
        max-width: 100%;
        overflow-x: auto;

        div.player {
            width: fit-content;
        }

        h3 {
            width: 100%;
            text-align: center;
        }

        div.player.turn h3 {
            text-shadow: 0 1px 2px orange;
        }

        div.player.target h3 {
            text-shadow: 0 1px 2px blue;
        }

        .hand {
            height: 0;
            margin-bottom: 6rem;
            margin-right: 2.5rem;
            display: flex;

            div {
                margin-bottom: -100%;
                margin-top: -2rem;
                margin-left: -1.5rem;
                margin-right: -4rem;
                transform: scale(0.5);
            }
        }
    }


    .card.enabled,
    #drawPile {
        cursor: pointer;
    }

    #deck {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        margin-left: auto;
        margin-right: auto;
        width: fit-content;

        #cooldown {
            height: 1rem;
            width: 6.25rem;
            padding: 0.25rem;
            background: #eee;
            border-radius: 0.25rem;
            transition: opacity 0.25s;
            opacity: 0;

            div {
                height: 1rem;
                border-radius: 0.25rem;
            }
        }
    }

    #discardPile {
        display: relative;
        height: 11rem;
    }

    #hand {
        display: flex;
        flex-wrap: wrap;
        border-radius: 0.5rem;
        opacity: 1;
        transition: opacity 0.5s;
    }

    #hand.turn {
        box-shadow: 0 0 0.5rem orange, 0 0 0.5rem orange inset;
    }

    #hand.target {
        box-shadow: 0 0 0.5rem blue, 0 0 0.5rem blue inset;
    }

    .cardGroup {
        position: relative;
        display: flex;
        flex-direction: column;
        margin-bottom: 8rem;

        div {
            position: relative;
            margin-bottom: -7rem;
        }
    }

    #overlay {
        display: block;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        backdrop-filter: blur(0.4rem);
    }

    #overlay.hidden,
    #overlay .hidden {
        display: none;
    }

    #overlay>div {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 1rem;
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
    }

    #future {
        ol {
            width: max-content;

            li {
                float: left;
                width: fit-content;
                height: fit-content;
                margin-right: 2.5rem;
            }

            li::marker {
                font-size: 1.5rem;
            }
        }

        button {
            margin: 0 40%;
            margin-top: 1rem;
            width: 20%;
        }
    }

    #insert {
        .card {
            transform: scaleY(0.2);
            margin: -3rem 0;
        }

        input {
            width: 1rem;
            height: 4rem;
            writing-mode: vertical-lr;
            direction: rtl;
        }
    }

    #insert>div {
        display: flex;
        gap: 1rem;
    }
</style>

<h1 id="turnStatus">Waiting for game to start...</h1>
<h3 id="playStatus"></h3>
<button id="leave">Leave</button>
<label class="toggle">
    <input id="enableSoundEffects" type="checkbox" checked>
    Sound effects
</label>
<section id="otherPlayers"></section>
<section id="deck">
    <div class="card back" id="drawPile" style="border-color: #eee">
        <img src="../../resources/images/back.png" alt="Deck">
    </div>
    <div>
        <div id="discardPile"></div>
        <div id="cooldown">
            <div></div>
        </div>
    </div>
</section>
<section id="hand">
    <div class="exploding cardGroup"></div>
    <div class="defuse cardGroup"></div>
    <div class="nope cardGroup"></div>
    <div class="attack cardGroup"></div>
    <div class="skip cardGroup"></div>
    <div class="shuffle cardGroup"></div>
    <div class="future cardGroup"></div>
    <div class="favor cardGroup"></div>
    <div class="cat1 cardGroup"></div>
    <div class="cat2 cardGroup"></div>
    <div class="cat3 cardGroup"></div>
    <div class="cat4 cardGroup"></div>
    <div class="cat5 cardGroup"></div>
</section>
<div id="overlay" class="hidden">
    <div id="obscure"></div>
    <div id="future" class="hidden">
        <h3>See The Future</h3>
        <ol></ol>
        <button>Ok</button>
    </div>
    <div id="insert" class="hidden">
        <h3>Insert Villain Card</h3>
        <div>
            <div class="card">
                <img src="../../resources/images/back.png" alt="Deck">
            </div>
            <input type="range" min="0" step="1">
        </div>
        <button>Ok</button>
    </div>
</div>
